apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: assettrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: 192.168.3.236/assettrack/webapp:v1
        ports:
        - containerPort: 8000
