apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: assettrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: 192.168.3.236/assettrack/api:v1
        ports:
        - containerPort: 8000
        env:
        - name: RABBITMQ_HOST
          value: rabbitmq
        - name: POSTGRES_HOST
          value: postgres
